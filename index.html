<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeFlow</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #0f0f0f;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.07);
  --accent: #e8c96a;
  --accent2: #6ab4e8;
  --text: #e0e0e0;
  --muted: #555;
  --correct: #6ec97a;
  --wrong: #e86a6a;
  --cursor: #e8c96a;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 1rem;
  user-select: none;
}

header {
  width: 100%;
  max-width: 900px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.5rem 0 1rem;
  border-bottom: 1px solid var(--border);
}

.logo {
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  color: var(--accent);
}
.logo span { color: var(--text); }

.stats-bar {
  display: flex;
  gap: 1.5rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  color: var(--muted);
}

.stat-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.stat-val { color: var(--text); font-size: 1.1rem; font-weight: 500; transition: color 0.2s; }
.stat-val.live { color: var(--accent); }

.controls {
  width: 100%;
  max-width: 900px;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 1.2rem 0 0.8rem;
  flex-wrap: wrap;
}

.pill-group {
  display: flex;
  background: var(--surface);
  border-radius: 999px;
  padding: 3px;
  border: 1px solid var(--border);
}

.pill {
  padding: 0.28rem 0.85rem;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.pill.active {
  background: var(--accent);
  color: #0f0f0f;
  font-weight: 500;
}

.pill:hover:not(.active) { color: var(--text); }

.sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  margin: 0 0.3rem;
  align-self: center;
}

.lang-select-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.lang-select {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  padding: 0.3rem 2rem 0.3rem 0.85rem;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  transition: border-color 0.2s;
}

.lang-select:hover { border-color: rgba(255,255,255,0.2); }

.lang-arrow {
  position: absolute;
  right: 0.7rem;
  pointer-events: none;
  color: var(--muted);
  font-size: 0.6rem;
}

.timer-display {
  margin-left: auto;
  font-family: 'DM Mono', monospace;
  font-size: 1.8rem;
  font-weight: 300;
  color: var(--accent);
  min-width: 3.5rem;
  text-align: right;
  transition: color 0.3s;
}

.timer-display.urgent { color: var(--wrong); animation: pulse 0.5s ease infinite alternate; }
@keyframes pulse { from{opacity:1} to{opacity:0.5} }

.test-area {
  width: 100%;
  max-width: 900px;
  margin: 1rem 0 0;
  position: relative;
  cursor: text;
}

.words-wrapper {
  position: relative;
  padding: 1.5rem;
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--border);
  min-height: 110px;
  overflow: hidden;
  transition: border-color 0.3s;
}

.words-wrapper.focused { border-color: rgba(232,201,106,0.25); }
.words-wrapper.finished { border-color: rgba(110,201,122,0.3); }

.words-container {
  font-family: 'DM Mono', monospace;
  font-size: 1.25rem;
  line-height: 1.9;
  letter-spacing: 0.01em;
  transition: filter 0.2s;
  position: relative;
}

.words-container.blurred { filter: blur(4px); pointer-events: none; }

.click-hint {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
}
.click-hint.visible { opacity: 1; }

.word {
  display: inline-block;
  margin-right: 0.5em;
  position: relative;
}

.letter {
  color: var(--muted);
  position: relative;
  transition: color 0.05s;
}
.letter.correct { color: var(--correct); }
.letter.wrong { color: var(--wrong); text-decoration: underline; text-decoration-color: var(--wrong); }
.letter.active-letter::before {
  content: '';
  position: absolute;
  left: -1px;
  top: 10%;
  height: 80%;
  width: 2px;
  background: var(--cursor);
  border-radius: 2px;
  animation: blink 0.7s step-end infinite;
}
.letter.active-letter.after::before {
  left: 100%;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.word.current-word { background: rgba(255,255,255,0.02); border-radius: 3px; }

.extra-letter { color: var(--wrong); opacity: 0.8; }

#hidden-input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
  top: 0; left: 0;
  width: 1px; height: 1px;
}

.result-screen {
  width: 100%;
  max-width: 900px;
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 2rem 0;
  gap: 1.5rem;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.result-screen.visible { display: flex; }

.result-big {
  display: flex;
  gap: 3rem;
  align-items: flex-end;
}

.result-metric { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.result-val {
  font-family: 'DM Mono', monospace;
  font-size: 3.5rem;
  font-weight: 300;
  color: var(--accent);
  line-height: 1;
}
.result-val.secondary { font-size: 2.2rem; color: var(--accent2); }
.result-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

.result-details {
  display: flex;
  gap: 2rem;
  padding: 1.2rem 2rem;
  background: var(--surface);
  border-radius: 10px;
  border: 1px solid var(--border);
}

.detail-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.detail-val { font-family: 'DM Mono', monospace; font-size: 1.2rem; color: var(--text); }
.detail-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

.btn-restart {
  background: var(--accent);
  color: #0f0f0f;
  border: none;
  border-radius: 999px;
  padding: 0.6rem 1.8rem;
  font-family: 'Syne', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  transition: opacity 0.2s, transform 0.15s;
}
.btn-restart:hover { opacity: 0.85; transform: scale(1.02); }

.restart-hint {
  position: absolute;
  bottom: 0.5rem;
  right: 0.8rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
}

.progress-bar-container {
  width: 100%;
  max-width: 900px;
  height: 2px;
  background: var(--surface);
  border-radius: 1px;
  margin-top: 0.5rem;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  width: 0%;
  border-radius: 1px;
  transition: width 0.3s linear;
}

footer {
  margin-top: auto;
  padding: 1.5rem 0 1rem;
  font-size: 0.7rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  display: flex;
  gap: 1rem;
}
</style>
</head>
<body>

<header>
  <div class="logo">Type<span>Flow</span></div>
  <div class="stats-bar">
    <div class="stat-item"><span class="stat-val" id="live-wpm">-</span><span>wpm</span></div>
    <div class="stat-item"><span class="stat-val" id="live-acc">-</span><span>acc</span></div>
  </div>
</header>

<div class="controls">
  <div class="pill-group" id="mode-group">
    <button class="pill active" data-mode="time">süre</button>
    <button class="pill" data-mode="words">kelime</button>
    <button class="pill" data-mode="quote">alıntı</button>
  </div>

  <div class="sep"></div>

  <div class="pill-group" id="time-group">
    <button class="pill active" data-time="15">15s</button>
    <button class="pill" data-time="30">30s</button>
    <button class="pill" data-time="60">60s</button>
    <button class="pill" data-time="120">120s</button>
  </div>

  <div class="pill-group" id="words-group" style="display:none">
    <button class="pill active" data-count="10">10</button>
    <button class="pill" data-count="25">25</button>
    <button class="pill" data-count="50">50</button>
    <button class="pill" data-count="100">100</button>
  </div>

  <div class="sep"></div>

  <div class="lang-select-wrapper">
    <select class="lang-select" id="lang-select">
      <option value="tr">🇹🇷 Türkçe</option>
      <option value="en" selected>🇺🇸 English</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="fr">🇫🇷 Français</option>
      <option value="es">🇪🇸 Español</option>
      <option value="it">🇮🇹 Italiano</option>
      <option value="pt">🇧🇷 Português</option>
      <option value="ru">🇷🇺 Русский</option>
      <option value="ja">🇯🇵 日本語</option>
      <option value="ko">🇰🇷 한국어</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="ar">🇸🇦 العربية</option>
      <option value="nl">🇳🇱 Nederlands</option>
      <option value="pl">🇵🇱 Polski</option>
      <option value="sv">🇸🇪 Svenska</option>
      <option value="no">🇳🇴 Norsk</option>
      <option value="fi">🇫🇮 Suomi</option>
      <option value="da">🇩🇰 Dansk</option>
      <option value="cs">🇨🇿 Čeština</option>
      <option value="hu">🇭🇺 Magyar</option>
    </select>
    <span class="lang-arrow">▼</span>
  </div>

  <div class="timer-display" id="timer-display">15</div>
</div>

<div class="progress-bar-container">
  <div class="progress-bar" id="progress-bar"></div>
</div>

<div class="test-area" id="test-area" onclick="focusInput()">
  <div class="words-wrapper" id="words-wrapper">
    <div class="words-container blurred" id="words-container"></div>
    <div class="click-hint visible" id="click-hint">testin başlatmak için tıkla veya klavyeye bas</div>
    <div class="restart-hint">tab + enter → yeniden başlat</div>
  </div>
  <input type="text" id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
</div>

<div class="result-screen" id="result-screen">
  <div class="result-big">
    <div class="result-metric">
      <div class="result-val" id="res-wpm">0</div>
      <div class="result-label">wpm</div>
    </div>
    <div class="result-metric">
      <div class="result-val secondary" id="res-acc">0%</div>
      <div class="result-label">doğruluk</div>
    </div>
  </div>
  <div class="result-details">
    <div class="detail-item"><div class="detail-val" id="res-raw">0</div><div class="detail-label">ham wpm</div></div>
    <div class="detail-item"><div class="detail-val" id="res-correct">0</div><div class="detail-label">doğru</div></div>
    <div class="detail-item"><div class="detail-val" id="res-wrong">0</div><div class="detail-label">yanlış</div></div>
    <div class="detail-item"><div class="detail-val" id="res-chars">0</div><div class="detail-label">karakter</div></div>
    <div class="detail-item"><div class="detail-val" id="res-time">0s</div><div class="detail-label">süre</div></div>
  </div>
  <button class="btn-restart" onclick="restartTest()">↺ tekrar dene</button>
</div>

<footer>
  <span>typeflow © 2025</span>
  <span>·</span>
  <span>tab+enter → yenile</span>
</footer>

const QUOTES = {
  en: ["The only way to do great work is to love what you do.","In the middle of every difficulty lies opportunity.","Life is what happens when you're busy making other plans.","The future belongs to those who believe in the beauty of their dreams.","It does not matter how slowly you go as long as you do not stop.","Everything you can imagine is real.","When you reach the end of your rope, tie a knot in it and hang on.","Always remember that you are absolutely unique. Just like everyone else.","Do not go where the path may lead, go instead where there is no path and leave a trail.","You will face many defeats in life, but never let yourself be defeated.","The greatest glory in living lies not in never falling, but in rising every time we fall.","In the end, it is not the years in your life that count. It is the life in your years.","Never let the fear of striking out keep you from playing the game.","Life is either a daring adventure or nothing at all."],
  tr: ["Büyük işler yapmanın tek yolu, yaptığınız şeyi sevmektir.","Her zorluğun ortasında bir fırsat yatmaktadır.","Hayat, başka planlar yaparken olan şeydir.","Gelecek, hayallerinin güzelliğine inananlarındır.","Ne kadar yavaş gittiğin önemli değil, durduğun sürece.","Hayal edebildiğin her şey gerçektir.","Hayat kısa, güzel şeyler için zaman hep az.","Başarı, bir kapıdan öteye geçmek demektir.","Düşmek önemli değil, her düştüğünde kalkmak önemlidir.","Güzel günler seni bekliyor, sabret."]
};

let state = {
  mode: 'time',
  timeLimit: 15,
  wordCount: 25,
  lang: 'en',
  words: [],
  currentWordIndex: 0,
  currentCharIndex: 0,
  typed: [],
  started: false,
  finished: false,
  startTime: null,
  timerInterval: null,
  timeLeft: 15,
  focused: false,
  totalKeystrokes: 0,
  correctKeystrokes: 0,
  wrongWords: 0,
  correctWords: 0
};

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

function getWords() {
  const list = WORD_LISTS[state.lang] || WORD_LISTS.en;
  if(state.mode === 'quote') {
    const qs = QUOTES[state.lang] || QUOTES.en;
    const q = qs[Math.floor(Math.random()*qs.length)];
    return q.split(' ').map(w=>w.toLowerCase().replace(/[^\w'-]/g,''));
  }
  const count = state.mode === 'words' ? state.wordCount : 200;
  return shuffle([...list,...list]).slice(0,count);
}

function initTest() {
  clearInterval(state.timerInterval);
  state.words = getWords();
  state.currentWordIndex = 0;
  state.currentCharIndex = 0;
  state.typed = state.words.map(()=>({chars:[], done:false, correct:false}));
  state.started = false;
  state.finished = false;
  state.startTime = null;
  state.timeLeft = state.timeLimit;
  state.totalKeystrokes = 0;
  state.correctKeystrokes = 0;
  state.wrongWords = 0;
  state.correctWords = 0;

  document.getElementById('result-screen').classList.remove('visible');
  document.getElementById('test-area').style.display = 'block';
  document.getElementById('live-wpm').textContent = '-';
  document.getElementById('live-acc').textContent = '-';
  document.getElementById('live-wpm').classList.remove('live');
  document.getElementById('live-acc').classList.remove('live');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('timer-display').classList.remove('urgent');

  if(state.mode === 'time') {
    document.getElementById('timer-display').textContent = state.timeLimit;
  } else {
    document.getElementById('timer-display').textContent = '';
  }

  renderWords();
  blurWords(true);
}

function renderWords() {
  const container = document.getElementById('words-container');
  container.innerHTML = '';
  state.words.forEach((word, wi) => {
    const wEl = document.createElement('span');
    wEl.className = 'word' + (wi === state.currentWordIndex ? ' current-word' : '');
    wEl.dataset.index = wi;
    word.split('').forEach((ch, ci) => {
      const l = document.createElement('span');
      l.className = 'letter';
      if(state.typed[wi] && ci < state.typed[wi].chars.length) {
        l.className = 'letter ' + (state.typed[wi].chars[ci] === ch ? 'correct' : 'wrong');
      }
      if(wi === state.currentWordIndex && ci === state.currentCharIndex) {
        l.classList.add('active-letter');
      }
      l.textContent = ch;
      wEl.appendChild(l);
    });
    // extra typed chars beyond word length
    if(state.typed[wi] && state.typed[wi].chars.length > word.length) {
      for(let i=word.length;i<state.typed[wi].chars.length;i++) {
        const l = document.createElement('span');
        l.className = 'letter extra-letter wrong';
        if(wi === state.currentWordIndex && i === state.currentCharIndex) l.classList.add('active-letter','after');
        l.textContent = state.typed[wi].chars[i];
        wEl.appendChild(l);
      }
    }
    // cursor at end of word
    if(wi === state.currentWordIndex && state.currentCharIndex >= word.length) {
      const lastChild = wEl.lastChild;
      if(lastChild && !lastChild.classList.contains('active-letter')) {
        lastChild.classList.add('active-letter','after');
      }
    }
    container.appendChild(wEl);
  });
  scrollToCurrentWord();
}

function scrollToCurrentWord() {
  const container = document.getElementById('words-container');
  const wrapper = document.getElementById('words-wrapper');
  const currentEl = container.querySelector('.current-word');
  if(!currentEl) return;
  const wrapTop = wrapper.getBoundingClientRect().top;
  const elTop = currentEl.getBoundingClientRect().top;
  const relTop = elTop - wrapTop;
  if(relTop > 60) {
    container.style.marginTop = (parseFloat(container.style.marginTop||0) - relTop + 40) + 'px';
  }
  if(relTop < 0) {
    container.style.marginTop = (parseFloat(container.style.marginTop||0) - relTop + 10) + 'px';
  }
}

function blurWords(blur) {
  const wc = document.getElementById('words-container');
  const hint = document.getElementById('click-hint');
  const wrapper = document.getElementById('words-wrapper');
  if(blur) {
    wc.classList.add('blurred');
    hint.classList.add('visible');
    wrapper.classList.remove('focused');
  } else {
    wc.classList.remove('blurred');
    hint.classList.remove('visible');
    wrapper.classList.add('focused');
  }
}

function focusInput() {
  if(state.finished) return;
  document.getElementById('hidden-input').focus();
  state.focused = true;
  blurWords(false);
}

function startTimer() {
  state.startTime = Date.now();
  state.started = true;
  if(state.mode === 'time') {
    state.timerInterval = setInterval(() => {
      const elapsed = (Date.now() - state.startTime) / 1000;
      state.timeLeft = Math.max(0, state.timeLimit - elapsed);
      const display = document.getElementById('timer-display');
      display.textContent = Math.ceil(state.timeLeft);
      if(state.timeLeft <= 5) display.classList.add('urgent');
      const progress = ((state.timeLimit - state.timeLeft) / state.timeLimit) * 100;
      document.getElementById('progress-bar').style.width = progress + '%';
      updateLiveStats();
      if(state.timeLeft <= 0) finishTest();
    }, 50);
  }
}

function updateLiveStats() {
  if(!state.startTime) return;
  const elapsed = (Date.now() - state.startTime) / 1000 / 60;
  const wpmEl = document.getElementById('live-wpm');
  const accEl = document.getElementById('live-acc');
  if(elapsed > 0) {
    const wpm = Math.round(state.correctKeystrokes / 5 / elapsed);
    wpmEl.textContent = wpm;
    wpmEl.classList.add('live');
    const acc = state.totalKeystrokes > 0 ? Math.round((state.correctKeystrokes/state.totalKeystrokes)*100) : 100;
    accEl.textContent = acc + '%';
    accEl.classList.add('live');
  }
}

function finishTest() {
  clearInterval(state.timerInterval);
  state.finished = true;
  const elapsed = (Date.now() - state.startTime) / 1000;
  const elapsedMin = elapsed / 60;
  const wpm = Math.round(state.correctKeystrokes / 5 / elapsedMin);
  const rawWpm = Math.round(state.totalKeystrokes / 5 / elapsedMin);
  const acc = state.totalKeystrokes > 0 ? Math.round((state.correctKeystrokes/state.totalKeystrokes)*100) : 100;
  // count correct/wrong words
  let cw=0, ww=0, totalChars=0;
  state.typed.forEach((t,i)=>{
    if(t.done) {
      const wordCorrect = t.chars.join('') === state.words[i];
      if(wordCorrect) cw++; else ww++;
      totalChars += t.chars.length;
    }
  });

  document.getElementById('res-wpm').textContent = wpm;
  document.getElementById('res-acc').textContent = acc + '%';
  document.getElementById('res-raw').textContent = rawWpm;
  document.getElementById('res-correct').textContent = cw;
  document.getElementById('res-wrong').textContent = ww;
  document.getElementById('res-chars').textContent = totalChars;
  document.getElementById('res-time').textContent = Math.round(elapsed) + 's';
  document.getElementById('progress-bar').style.width = '100%';

  document.getElementById('words-wrapper').classList.add('finished');
  document.getElementById('test-area').style.display = 'none';
  document.getElementById('result-screen').classList.add('visible');
}

function restartTest() {
  document.getElementById('words-container').style.marginTop = '0';
  document.getElementById('words-wrapper').classList.remove('finished');
  initTest();
}

document.getElementById('hidden-input').addEventListener('keydown', (e) => {
  if(state.finished) return;
  if(e.key === 'Tab') { e.preventDefault(); return; }
  
  if(!state.started && e.key !== 'Backspace') startTimer();

  const word = state.words[state.currentWordIndex];
  const typedWord = state.typed[state.currentWordIndex];

  if(e.key === 'Backspace') {
    if(typedWord.chars.length > 0) {
      typedWord.chars.pop();
      state.currentCharIndex = typedWord.chars.length;
      renderWords();
    } else if(state.currentWordIndex > 0 && !state.typed[state.currentWordIndex-1].done) {
      state.currentWordIndex--;
      state.currentCharIndex = state.typed[state.currentWordIndex].chars.length;
      renderWords();
    }
    return;
  }

  if(e.key === ' ') {
    if(typedWord.chars.length === 0) return;
    typedWord.done = true;
    typedWord.correct = typedWord.chars.join('') === word;
    
    if(state.mode === 'words' && state.currentWordIndex >= state.words.length - 1) {
      finishTest(); return;
    }
    if(state.currentWordIndex < state.words.length - 1) {
      state.currentWordIndex++;
      state.currentCharIndex = 0;
    }
    renderWords();
    updateLiveStats();
    if(state.mode === 'words') {
      const progress = (state.currentWordIndex / state.words.length) * 100;
      document.getElementById('progress-bar').style.width = progress + '%';
    }
    return;
  }

  if(e.key.length === 1) {
    if(typedWord.chars.length < word.length + 15) {
      typedWord.chars.push(e.key);
      state.currentCharIndex = typedWord.chars.length;
      state.totalKeystrokes++;
      if(e.key === word[typedWord.chars.length - 1]) state.correctKeystrokes++;
      renderWords();
      updateLiveStats();
    }
  }

  if(state.mode === 'quote' && state.currentWordIndex === state.words.length - 1) {
    const lastWord = state.words[state.words.length - 1];
    if(state.typed[state.currentWordIndex].chars.join('') === lastWord) {
      setTimeout(finishTest, 100);
    }
  }
});

document.getElementById('hidden-input').addEventListener('blur', () => {
  if(!state.finished) {
    state.focused = false;
    blurWords(true);
  }
});

document.querySelectorAll('#mode-group .pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#mode-group .pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.mode = btn.dataset.mode;
    document.getElementById('time-group').style.display = state.mode === 'time' ? 'flex' : 'none';
    document.getElementById('words-group').style.display = state.mode === 'words' ? 'flex' : 'none';
    document.getElementById('timer-display').style.display = state.mode === 'time' ? 'block' : 'none';
    document.getElementById('words-container').style.marginTop = '0';
    restartTest();
  });
});

document.querySelectorAll('#time-group .pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#time-group .pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.timeLimit = parseInt(btn.dataset.time);
    restartTest();
  });
});

document.querySelectorAll('#words-group .pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#words-group .pill').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.wordCount = parseInt(btn.dataset.count);
    restartTest();
  });
});

document.getElementById('lang-select').addEventListener('change', (e) => {
  state.lang = e.target.value;
  restartTest();
});

document.addEventListener('keydown', (e) => {
  if(e.key === 'Tab') {
    e.preventDefault();
    document.getElementById('hidden-input').focus();
  }
  if(e.key === 'Enter' && document.activeElement === document.getElementById('hidden-input')) {
    restartTest();
    setTimeout(focusInput, 50);
  }
});

initTest();
setTimeout(focusInput, 200);
</script>
